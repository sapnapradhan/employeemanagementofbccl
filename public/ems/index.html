<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BCCL EMS — Login</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="login-wrap">
  <form class="login-card" id="loginForm" autocomplete="off">
    <div class="brand">
      <img src="assets/bccl-logo.jpeg" alt="BCCL" />
      <h1>BCCL Employee Management</h1>
      <p class="sub">Bharat Coking Coal Limited · Secure Portal</p>
    </div>

    <div class="auth-tabs" style="display:flex;gap:8px;margin:14px 0 18px;">
      <button type="button" data-mode="signin" class="btn ghost active" style="flex:1">Sign In</button>
      <button type="button" data-mode="signup" class="btn ghost" style="flex:1">Sign Up</button>
    </div>

    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input id="email" type="email" placeholder="you@bccl.in" autocomplete="email" required />
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" minlength="6" required />
      </div>
    </div>

    <div class="alert" id="loginAlert"><i class="fa-solid fa-circle-exclamation"></i> <span></span></div>

    <div style="margin-top: 22px;">
      <button class="btn block" type="submit" id="submitBtn"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
    </div>

    <p class="hint">Secure authentication powered by Lovable Cloud</p>

  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/storage.js"></script>
<script src="js/login.js"></script>
</body>
</html>
