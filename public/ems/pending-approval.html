<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BCCL EMS — Pending Approval</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="auth">
<div class="auth-wrap">
  <div class="auth-card pending-card">
    <div class="brand">
      <img src="assets/bccl-logo.jpeg" alt="BCCL" />
      <div><div class="t">BCCL EMS</div><div class="s">Employee Portal</div></div>
    </div>

    <div class="pending-icon"><i class="fa-solid fa-hourglass-half"></i></div>
    <h2 style="margin:8px 0 6px;text-align:center">Awaiting Admin Approval</h2>
    <p class="hint" style="text-align:center">
      Your account <b id="pendEmail">—</b> has been created and is pending review by the BCCL administrator.
      You'll get access to your Employee Portal as soon as it's approved.
    </p>

    <div class="status-row" id="statusRow">
      <span class="dot"></span>
      <span id="statusText">Checking status…</span>
    </div>

    <div class="form-actions" style="justify-content:center;margin-top:18px">
      <button class="btn ghost" id="refreshBtn"><i class="fa-solid fa-rotate"></i> Check again</button>
      <button class="btn danger" id="signOutBtn"><i class="fa-solid fa-right-from-bracket"></i> Sign out</button>
    </div>

    <p class="hint" style="text-align:center;margin-top:10px;font-size:12px">
      This page auto-refreshes every 15 seconds.
    </p>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supa.js"></script>
<script src="js/storage.js"></script>
<script src="js/pending.js"></script>
</body>
</html>
