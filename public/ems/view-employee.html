<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BCCL EMS — Employees</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
      <div class="page-title"><i class="fa-solid fa-users"></i> &nbsp;All Employees</div>
      <div class="grow"></div>
      <button class="icon-btn" id="themeToggle"><i class="fa-solid fa-moon"></i></button>
      <div class="user"><div class="avatar">A</div><div><div style="font-size:13px;font-weight:600">Admin</div><div style="font-size:11px;color:var(--text-muted)">BCCL HQ</div></div></div>
    </header>
    <section class="content">
      <div class="card">
        <div class="toolbar">
          <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input id="searchInput" placeholder="Search by name or Employee ID..." /></div>
          <select id="statusFilter" class="seg-select" style="padding:10px 14px;border-radius:12px;background:var(--glass);color:var(--text);border:1px solid var(--border)">
            <option value="">All sources</option>
            <option value="local">Local (admin-added)</option>
            <option value="pending">Cloud · Pending approval</option>
            <option value="approved">Cloud · Approved</option>
            <option value="rejected">Cloud · Rejected</option>
          </select>
          <a class="btn" href="add-employee.html"><i class="fa-solid fa-user-plus"></i> Add Employee</a>
        </div>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table id="empTable">
            <thead><tr>
              <th></th><th>Emp ID</th><th>Name</th><th>Department</th><th>Designation</th><th>Salary</th><th>Phone</th><th>Email</th><th>Status</th><th style="text-align:right">Actions</th>
            </tr></thead>
            <tbody id="empBody"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty" style="display:none"><i class="fa-solid fa-folder-open" style="font-size:32px;opacity:.6"></i><p style="margin-top:10px">No employees found.</p></div>
        <div class="pager" id="pager"></div>
      </div>
    </section>
  </main>
</div>

<div class="modal" id="confirmModal">
  <div class="box">
    <h3><i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b"></i> Confirm Deletion</h3>
    <p id="confirmText">Are you sure you want to delete this employee? This action cannot be undone.</p>
    <div class="actions">
      <button class="btn ghost" id="confirmCancel">Cancel</button>
      <button class="btn danger" id="confirmOk"><i class="fa-solid fa-trash"></i> Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/storage.js"></script>
<script src="js/layout.js"></script>
<script src="js/employee.js"></script>
</body>
</html>
