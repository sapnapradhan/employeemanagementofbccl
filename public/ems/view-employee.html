<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BCCL EMS — Employees</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
      <div class="page-title"><i class="fa-solid fa-users"></i> &nbsp;All Employees</div>
      <div class="grow"></div>
      <button class="icon-btn" id="themeToggle"><i class="fa-solid fa-moon"></i></button>
      <div class="user"><div class="avatar">A</div><div><div style="font-size:13px;font-weight:600">Admin</div><div style="font-size:11px;color:var(--text-muted)">BCCL HQ</div></div></div>
    </header>
    <section class="content">
      <div class="card">
        <div class="toolbar">
          <div class="field no-icon" style="min-width:260px"><input id="q" placeholder="Search name, code, PAN, department…" /></div>
          <div class="grow"></div>
          <button class="btn ghost" id="refreshBtn"><i class="fa-solid fa-rotate"></i> Refresh</button>
        </div>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Code</th><th>Name</th><th>Email</th><th>Department</th>
              <th>Salary</th><th>PAN</th><th>Aadhaar</th><th>Status</th>
              <th style="text-align:right">Actions</th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty" style="display:none">No employees found.</div>
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supa.js"></script>
<script src="js/storage.js"></script>
<script src="js/masking.js"></script>
<script src="js/layout.js"></script>
<script src="js/employee.js"></script>
</body>
</html>
